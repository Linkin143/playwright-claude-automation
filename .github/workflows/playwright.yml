name: Playwright + Allure Report

on:
  schedule:
    # Multiple triggers to beat GitHub Actions delays
    - cron: '20 3 * * *'  # 08:50 IST
    - cron: '25 3 * * *'  # 08:55 IST  
    - cron: '30 3 * * *'  # 09:00 IST (target)
    - cron: '35 3 * * *'  # 09:05 IST (backup)

  workflow_dispatch:
    inputs:
      mode:
        description: "Select test execution mode"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - file
          - folder
          - multiple

      test_path:
        description: |
          File or folder path
          Examples:
          - tests/passedTC/example.spec.ts
          - tests/passedTC/msn/
        required: false

      test_list:
        description: |
          Comma-separated test files
          Example:
          tests/passedTC/msn/a.spec.ts,tests/passedTC/msn/b.spec.ts
        required: false

      send_email:
        description: "Send email report?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write
  checks: write

concurrency:
  group: playwright-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}

      - name: Install browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install browser dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Create output directories
        run: mkdir -p reports/allure-results reports/allure-report reports/test-results

      - name: Load Schedule Config
        id: config
        run: |
          DAY=$(TZ=Asia/Kolkata date +%A | tr '[:upper:]' '[:lower:]')
          echo "📅 Today (IST): $DAY"

          CONFIG_FILE=".github/schedule-config.json"

          if [ -f "$CONFIG_FILE" ]; then
            MODE=$(jq -r --arg day "$DAY" '.[$day].mode // .default.mode' $CONFIG_FILE)
            TEST_PATH=$(jq -r --arg day "$DAY" '.[$day].test_path // empty' $CONFIG_FILE)
            TEST_LIST=$(jq -r --arg day "$DAY" '.[$day].test_list // empty' $CONFIG_FILE)
          else
            echo "⚠️ Config file not found, using defaults"
            MODE="all"
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "test_path=$TEST_PATH" >> $GITHUB_OUTPUT
          echo "test_list=$TEST_LIST" >> $GITHUB_OUTPUT
          
          echo "🎯 Execution mode: $MODE"

      - name: Run Playwright Tests
        id: test-execution
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode || 'all' }}"
            TEST_PATH="${{ github.event.inputs.test_path }}"
            TEST_LIST="${{ github.event.inputs.test_list }}"
            echo "🖱️ Manual run"
          else
            MODE="${{ steps.config.outputs.mode }}"
            TEST_PATH="${{ steps.config.outputs.test_path }}"
            TEST_LIST="${{ steps.config.outputs.test_list }}"
            echo "⏰ Scheduled run"
          fi

          echo "🎯 Mode: $MODE"

          if [ "$MODE" = "skip" ]; then
            echo "⏭️ Skipping execution for today"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          RETRY_FLAG="--retries=1"

          if [ "$MODE" = "file" ]; then
            echo "📄 Running file: $TEST_PATH"
            npx playwright test "$TEST_PATH" $RETRY_FLAG || true

          elif [ "$MODE" = "folder" ]; then
            echo "📁 Running folder: $TEST_PATH"
            npx playwright test "$TEST_PATH" $RETRY_FLAG || true

          elif [ "$MODE" = "multiple" ]; then
            echo "📄📄 Running multiple files"
            FILES=$(echo "$TEST_LIST" | tr ',' ' ')
            npx playwright test $FILES $RETRY_FLAG || true

          else
            echo "🌐 Running all tests in tests/passedTC/"
            npx playwright test tests/passedTC/ $RETRY_FLAG || true
          fi

          echo "skipped=false" >> $GITHUB_OUTPUT

      - name: Preserve Allure History
        if: always() && steps.test-execution.outputs.skipped != 'true'
        run: |
          if [ -d "reports/allure-report/history" ]; then
            echo "📊 Preserving history for trends"
            cp -r reports/allure-report/history reports/allure-results/
          fi

      - name: Add Allure Executor Info
        if: always() && steps.test-execution.outputs.skipped != 'true'
        run: |
          cat > reports/allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "Run #${{ github.run_number }} — ${{ github.ref_name }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          }
          EOF

      - name: Generate Allure Report
        if: always() && steps.test-execution.outputs.skipped != 'true'
        run: |
          echo "📊 Generating Allure report..."
          
          if [ ! -d "reports/allure-results" ] || [ -z "$(ls -A reports/allure-results 2>/dev/null)" ]; then
            echo "⚠️ No test results found in reports/allure-results/"
            mkdir -p reports/allure-report
            echo "<html><body><h1>No test results available</h1></body></html>" > reports/allure-report/index.html
            exit 0
          fi
          
          rm -rf reports/allure-report
          
          if npx allure generate reports/allure-results -o reports/allure-report; then
            echo "✅ Allure report generated successfully"
            echo "📁 Report size: $(du -sh reports/allure-report 2>/dev/null | cut -f1 || echo 'unknown')"
          else
            echo "❌ Allure generation failed"
            echo "📋 Checking Allure logs..."
            cat ~/.allure/logs/*.log 2>/dev/null || echo "No Allure logs found"
            
            echo "📋 Allure results structure:"
            ls -lah reports/allure-results/ 2>/dev/null | head -20 || echo "reports/allure-results/ not found"
            
            exit 1
          fi

      - name: Post Allure Summary to PR
        if: always() && steps.test-execution.outputs.skipped != 'true'
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./reports/allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Test Results CSV
        if: always() && steps.test-execution.outputs.skipped != 'true'
        run: |
          echo "Test Name,Status,Duration(ms),Browser,Suite" > reports/test-results/allure-summary.csv
          if [ -d "reports/allure-results" ]; then
            for f in reports/allure-results/*-result.json; do
              [ -f "$f" ] || continue
              NAME=$(jq -r '.name // "unknown"' "$f")
              STATUS=$(jq -r '.status // "unknown"' "$f")
              DURATION=$(jq -r '(.stop - .start) // 0' "$f" 2>/dev/null || echo "0")
              BROWSER=$(jq -r '.labels[]? | select(.name=="thread") | .value' "$f" | head -1)
              SUITE=$(jq -r '.labels[]? | select(.name=="suite") | .value' "$f" | head -1)
              echo "\"$NAME\",\"$STATUS\",\"$DURATION\",\"$BROWSER\",\"$SUITE\"" >> reports/test-results/allure-summary.csv
            done
          fi
          
          CSV_SIZE=$(wc -c < reports/test-results/allure-summary.csv 2>/dev/null || echo "0")
          if [ "$CSV_SIZE" -gt 1048576 ]; then
            echo "📦 Compressing large CSV ($(($CSV_SIZE / 1024))KB)"
            gzip reports/test-results/allure-summary.csv
          fi
          
          echo "✅ CSV ready"

      - name: Upload Test Artifacts
        if: always() && steps.test-execution.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-run-${{ github.run_number }}
          path: |
            reports/test-results/allure-summary.csv*
            reports/test-results/results.json
            reports/allure-report/
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        if: always() && steps.test-execution.outputs.skipped != 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/allure-report
          keep_files: true

      - name: Send Email Report
        if: |
          always() && 
          steps.test-execution.outputs.skipped != 'true' &&
          (github.event.inputs.send_email != 'false' || github.event_name == 'schedule')
        run: node sendReport.js
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Job Summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.test-execution.outputs.skipped }}" = "true" ]; then
            echo "⏭️ Tests skipped for today (Saturday/Sunday)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Tests executed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 [View Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
          fi